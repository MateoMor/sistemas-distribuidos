<!DOCTYPE html>
<html>
<head>
  <title>P2P Node</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090b;
      --panel: #18181b;
      --line: #27272a;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --primary: #8b5cf6;
      --primary-strong: #7c3aed;
      --primary-soft: rgba(139, 92, 246, 0.15);
      --ok-bg: rgba(34, 197, 94, 0.15);
      --ok-text: #4ade80;
      --msg-sent: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
      --msg-received: #27272a;
    }
    body {
      font-family: "Inter", "Segoe UI", sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      padding: 0;
      margin: 0;
    }
    #sidebar {
      width: 300px;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      background: var(--panel);
    }
    #sidebar h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      padding: 20px;
      border-bottom: 1px solid var(--line);
      margin: 0;
    }
    #node-list { flex: 1; overflow-y: auto; padding: 12px; }
    .node-item {
      position: relative;
      padding: 14px 16px;
      cursor: pointer;
      border: 1px solid transparent;
      border-radius: 8px;
      transition: all .2s ease;
      margin-bottom: 4px;
    }
    .node-item:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    .node-item.active {
      background: var(--primary-soft);
      border-color: rgba(139, 92, 246, 0.3);
    }
    .node-item .nid { font-size: 14px; font-weight: 600; color: #fff; }
    .node-item .nmeta { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .node-item .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 12px;
      background: var(--ok-bg);
      color: var(--ok-text);
      margin-top: 8px;
    }
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    #chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(24, 24, 27, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    #chat-header-main {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #call-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .call-btn {
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: #27272a;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .call-btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }
    .call-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    #call-btn {
      background: #16a34a;
      border-color: #16a34a;
    }
    #call-btn:hover:not(:disabled) {
      background: #15803d;
      border-color: #15803d;
    }
    #hangup-btn {
      background: #dc2626;
      border-color: #dc2626;
    }
    #hangup-btn:hover:not(:disabled) {
      background: #b91c1c;
      border-color: #b91c1c;
    }
    #call-status {
      font-size: 12px;
      color: var(--muted);
      min-width: 150px;
      text-align: right;
    }
    #incoming-call {
      display: none;
      align-items: center;
      gap: 6px;
    }
    #incoming-call-text {
      font-size: 12px;
      color: var(--muted);
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #accept-btn {
      background: #16a34a;
      border-color: #16a34a;
    }
    #accept-btn:hover:not(:disabled) {
      background: #15803d;
      border-color: #15803d;
    }
    #reject-btn {
      background: #dc2626;
      border-color: #dc2626;
    }
    #reject-btn:hover:not(:disabled) {
      background: #b91c1c;
      border-color: #b91c1c;
    }
    .call-btn.off {
      background: #3f3f46 !important;
      border-color: #3f3f46 !important;
      color: #d4d4d8;
    }
    #video-panel {
      display: none;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(9, 9, 11, 0.9);
    }
    .video-wrap {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      min-height: 160px;
    }
    .video-wrap video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #000;
    }
    .video-label {
      position: absolute;
      left: 8px;
      bottom: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      color: #fff;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    #chat-header h2 { font-size: 18px; font-weight: 600; margin: 0; color: #fff; }
    #chat-header p { font-size: 13px; color: var(--muted); margin-top: 4px; margin-bottom: 0; }
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 65%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      color: #fff;
    }
    .msg.sent {
      align-self: flex-end;
      background: var(--msg-sent);
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
    }
    .msg.received {
      align-self: flex-start;
      background: var(--msg-received);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .msg .mmeta { font-size: 11px; opacity: .7; margin-bottom: 6px; font-weight: 500; }
    .msg-error {
      align-self: center;
      font-size: 12px;
      color: #fca5a5;
      background: rgba(239, 68, 68, 0.1);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    #typing-indicator {
      display: none;
      align-items: center;
      gap: 4px;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
      display: inline-block;
      animation: typing-bounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%           { transform: translateY(-4px); opacity: 1; }
    }

    .typing-text {
      font-size: 12px;
      color: var(--muted);
      margin-left: 4px;
      font-style: italic;
      letter-spacing: 0.01em;
    }
    #chat-input-row {
      padding: 20px 24px;
      border-top: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      gap: 12px;
    }
    #chat-input-row input {
      flex: 1;
      padding: 14px 18px;
      background: var(--bg);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: all .2s ease;
    }
    #chat-input-row input::placeholder { color: #52525b; }
    #chat-input-row input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }
    #chat-input-row button {
      padding: 0 24px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all .2s ease;
    }
    #chat-input-row button:hover:not(:disabled) {
      background: var(--primary-strong);
      transform: translateY(-1px);
    }
    #chat-input-row button:disabled {
      background: #3f3f46;
      color: #71717a;
      cursor: not-allowed;
    }
    #my-id {
      padding: 16px 20px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      background: rgba(0,0,0,0.2);
    }
    #no-selection {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 15px;
      flex-direction: column;
      gap: 12px;
    }
    #no-selection::before {
      content: '';
      font-size: 48px;
      opacity: 0.2;
    }
    #back-btn {
      display: none;
      cursor: pointer;
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      background: transparent;
      font-size: 18px;
      color: var(--text);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    #back-btn:hover {
      background: rgba(255,255,255,0.05);
    }
    .notif-badge {
      position: absolute;
      top: 14px;
      right: 16px;
      background: #ef4444;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      box-shadow: 0 2px 4px rgba(239, 68, 68, 0.3);
    }
    @media (max-width: 900px) {
      #sidebar { width: 240px; }
      .msg { max-width: 85%; }
      #video-panel {
        grid-template-columns: 1fr;
      }
      #call-status {
        display: none;
      }
    }
  </style>
</head>
<body>

<div id="sidebar" style="order: 2; border-right: none; border-left: 1px solid var(--line);">
  <h2>Comunidad P2P</h2>
  <div id="node-list"></div>
  <div id="my-id">Tu identidad: <strong>{{ node_id }}</strong></div>
</div>

<div id="chat-panel" style="order: 1;">
  <div id="chat-header">
    <div id="chat-header-main">
      <button id="back-btn" onclick="clearSelection()">X</button>
      <div>
        <h2 id="chat-title">Bienvenido</h2>
        <p id="chat-subtitle">Comienza a interactuar con los nodos de la red</p>
      </div>
    </div>
    <div id="call-controls">
      <button id="call-btn" class="call-btn" onclick="startCall()" disabled>Llamar</button>
      <button id="hangup-btn" class="call-btn" onclick="hangupCall()" disabled>Colgar</button>
      <button id="mic-btn" class="call-btn" onclick="toggleMic()" disabled>Mic ON</button>
      <button id="camera-btn" class="call-btn" onclick="toggleCamera()" disabled>Cam ON</button>
      <div id="incoming-call">
        <span id="incoming-call-text"></span>
        <button id="accept-btn" class="call-btn" onclick="acceptIncomingCall()">Aceptar</button>
        <button id="reject-btn" class="call-btn" onclick="rejectIncomingCall()">Rechazar</button>
      </div>
      <div id="call-status">Sin llamada</div>
    </div>
  </div>

  <div id="video-panel">
    <div class="video-wrap">
      <video id="local-video" autoplay muted playsinline></video>
      <span class="video-label">Tu cámara</span>
    </div>
    <div class="video-wrap">
      <video id="remote-video" autoplay playsinline></video>
      <span class="video-label">Nodo remoto</span>
    </div>
  </div>

  <div id="chat-box">
    <div id="no-selection">Conéctate a un nodo para chatear</div>
  </div>

  <div style="min-height: 28px; padding: 0 24px 4px;">
  <span id="typing-indicator">
    <span class="typing-dot"></span>
    <span class="typing-dot"></span>
    <span class="typing-dot"></span>
    <span class="typing-text">escribiendo</span>
  </span>
</div>

  <div id="chat-input-row">
    <input type="text" id="msg-input" placeholder="Escribe tu mensaje aquí..." disabled />
    <button id="send-btn" onclick="sendMsg()" disabled>Enviar</button>
  </div>
</div>  

<script>
  let activeNode = null;
  let allMessages = [];

  const rtcConfig = {
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  };

  let localStream = null;
  let remoteStream = null;
  let peerConnection = null;
  let isCallActive = false;
  let activeCallPeer = null;
  let pendingOffer = null;
  let pendingCaller = null;
  let lastTypingTime = 0;

  async function loadNodes() {
    const res = await fetch('/nodes/');
    const data = await res.json();
    const list = document.getElementById('node-list');
    const nodes = Object.values(data.nodes);

    if (nodes.length === 0) {
      list.innerHTML = '<div style="padding:16px;font-size:13px;color:var(--muted);text-align:center;">Escaneando la red...</div>';
      return;
    }

    list.innerHTML = nodes.map(n => `
      <div class="node-item ${activeNode === n.node_id ? 'active' : ''}"
          data-id="${n.node_id}"
          data-host="${n.hostname || ''}"
          data-load="${n.load || '?'}">
        <div class="nid">${n.node_id}</div>
        <div class="nmeta">${n.hostname || ''}</div>
        <span class="badge">carga: ${n.load || '?'}</span>
        ${n.discovered_via === 'udp'
          ? '<span class="badge" style="background:rgba(234, 179, 8, 0.15);color:#facc15;margin-left:4px;">UDP</span>'
          : ''}
        ${(unread[n.node_id] || 0) > 0
          ? `<div class="notif-badge">${unread[n.node_id]}</div>`
          : ''}
      </div>
    `).join('');

    document.querySelectorAll('.node-item').forEach(el => {
      el.addEventListener('click', () => {
        selectNode(el.dataset.id, el.dataset.host, el.dataset.load);
      });
    });
  }

  function clearSelection() {
    if (isCallActive) {
      hangupCall();
    }
    activeNode = null;
    document.getElementById('chat-title').textContent = 'Bienvenido';
    document.getElementById('chat-subtitle').textContent = 'Comienza a interactuar con los nodos de la red';
    document.getElementById('msg-input').disabled = true;
    document.getElementById('send-btn').disabled = true;
    document.getElementById('call-btn').disabled = true;
    document.getElementById('hangup-btn').disabled = true;
    document.getElementById('back-btn').style.display = 'none';
    document.getElementById('chat-box').innerHTML =
      '<div id="no-selection">Conéctate a un nodo para chatear</div>';
    loadNodes();
  }

  function selectNode(nodeId, hostname, load) {
    activeNode = nodeId;
    document.getElementById('chat-title').textContent = nodeId;
    document.getElementById('chat-subtitle').textContent = `${hostname} · carga ${load}`;
    document.getElementById('msg-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('call-btn').disabled = false;
    document.getElementById('hangup-btn').disabled = !isCallActive;
    document.getElementById('back-btn').style.display = 'block'; // ← mostrar flecha
    const noSel = document.getElementById('no-selection');
    if (noSel) noSel.style.display = 'none';
    loadNodes();
    loadMessages();
  }
  
  let unread = {};      
  let readCount = {};   

  async function loadMessages() {
    if (!activeNode) return;
    const res = await fetch(`/messages/?target=${encodeURIComponent(activeNode)}`);
    const data = await res.json();
    const prevCount = allMessages.length;
    allMessages = data.messages;
    // marcar todos los mensajes de este nodo como leídos
    const receivedFromActive = data.messages.filter(
      m => m.direction === 'received' && m.from === activeNode
    ).length;
    readCount[activeNode] = receivedFromActive;
    unread[activeNode] = 0;
    if (allMessages.length !== prevCount) renderMessages();
  }

  function renderMessages() {
    const box = document.getElementById('chat-box');
    if (allMessages.length === 0) {
      box.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:14px;margin-top:40px;">Aún no hay mensajes. ¡Rompe el hielo!</div>';
      return;
    }
    box.innerHTML = allMessages.map(m => `
      <div class="msg ${m.direction}">
        <div class="mmeta">${m.direction === 'sent' ? 'Tú enviaste a ' + m.to : m.from + ' te envió'}</div>
        ${m.text}
      </div>
    `).join('');
    box.scrollTop = box.scrollHeight;
  }

 async function checkUnread() {
    const res = await fetch('/messages/');
    const data = await res.json();
    // agrupar mensajes recibidos por remitente
    const receivedByNode = {};
    data.messages.forEach(m => {
      if (m.direction === 'received') {
        if (!receivedByNode[m.from]) receivedByNode[m.from] = 0;
        receivedByNode[m.from]++;
      }
    });
    // calcular no leídos como diferencia entre total y ya leídos
    Object.entries(receivedByNode).forEach(([nodeId, total]) => {
      if (nodeId === activeNode) {
        unread[nodeId] = 0;  
      } else {
        const alreadyRead = readCount[nodeId] || 0;
        unread[nodeId] = Math.max(0, total - alreadyRead);
      }
    });
  }

  setInterval(() => {
    checkUnread();
    loadNodes();
    if (activeNode) {
      loadMessages();
      checkTypingStatus(); // <- AÑADIR ESTA LÍNEA AQUÍ
    }
  }, 2000);

  async function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !activeNode) return;

    input.value = '';
    const res = await fetch(`/send/?target=${encodeURIComponent(activeNode)}&text=${encodeURIComponent(text)}`);
    const data = await res.json();

    if (!data.ok) {
      const box = document.getElementById('chat-box');
      const err = document.createElement('div');
      err.className = 'msg-error';
      err.textContent = data.error || 'Error al enviar';
      box.appendChild(err);
      box.scrollTop = box.scrollHeight;
      return;
    }
    loadMessages();
  }

  function setCallStatus(text) {
    document.getElementById('call-status').textContent = text;
  }

  function hideIncomingCall() {
    pendingOffer = null;
    pendingCaller = null;
    document.getElementById('incoming-call').style.display = 'none';
    document.getElementById('incoming-call-text').textContent = '';
  }

  function showIncomingCall(caller, offerData) {
    pendingCaller = caller;
    pendingOffer = offerData;
    document.getElementById('incoming-call-text').textContent = 'Llamada entrante de ' + caller;
    document.getElementById('incoming-call').style.display = 'flex';
    setCallStatus('Llamada entrante...');
  }

  function updateMediaButtons() {
    const micBtn = document.getElementById('mic-btn');
    const camBtn = document.getElementById('camera-btn');

    const audioTrack = localStream ? localStream.getAudioTracks()[0] : null;
    const videoTrack = localStream ? localStream.getVideoTracks()[0] : null;

    micBtn.disabled = !audioTrack;
    camBtn.disabled = !videoTrack;

    if (audioTrack) {
      micBtn.textContent = audioTrack.enabled ? 'Mic ON' : 'Mic OFF';
      micBtn.classList.toggle('off', !audioTrack.enabled);
    } else {
      micBtn.textContent = 'Mic OFF';
      micBtn.classList.add('off');
    }

    if (videoTrack) {
      camBtn.textContent = videoTrack.enabled ? 'Cam ON' : 'Cam OFF';
      camBtn.classList.toggle('off', !videoTrack.enabled);
    } else {
      camBtn.textContent = 'Cam OFF';
      camBtn.classList.add('off');
    }
  }

  function toggleMic() {
    if (!localStream) return;
    const track = localStream.getAudioTracks()[0];
    if (!track) return;
    track.enabled = !track.enabled;
    updateMediaButtons();
  }

  function toggleCamera() {
    if (!localStream) return;
    const track = localStream.getVideoTracks()[0];
    if (!track) return;
    track.enabled = !track.enabled;
    updateMediaButtons();
  }

  async function createLocalStream() {
    if (localStream) return localStream;
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('local-video').srcObject = localStream;
    updateMediaButtons();
    return localStream;
  }

  async function createPeerConnection(peerId) {
    hideIncomingCall();

    if (peerConnection) {
      peerConnection.close();
    }

    peerConnection = new RTCPeerConnection(rtcConfig);
    activeCallPeer = peerId;
    remoteStream = new MediaStream();
    document.getElementById('remote-video').srcObject = remoteStream;
    document.getElementById('video-panel').style.display = 'grid';

    const stream = await createLocalStream();
    stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));
    updateMediaButtons();

    peerConnection.ontrack = (event) => {
      event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
    };

    peerConnection.onicecandidate = async (event) => {
      if (!event.candidate || !activeCallPeer) return;
      await sendSignal(activeCallPeer, 'ice-candidate', event.candidate);
    };

    peerConnection.onconnectionstatechange = () => {
      const state = peerConnection.connectionState;
      if (state === 'connected') {
        isCallActive = true;
        document.getElementById('hangup-btn').disabled = false;
        setCallStatus('En llamada con ' + activeCallPeer);
      }
      if (state === 'failed' || state === 'disconnected' || state === 'closed') {
        endCallUi('Llamada finalizada');
      }
    };
  }

  async function sendSignal(target, signalType, signalData) {
    const res = await fetch('/webrtc/signal/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        target,
        signal_type: signalType,
        signal_data: signalData
      })
    });
    const data = await res.json();
    if (!res.ok || !data.ok) {
      throw new Error(data.error || 'No se pudo enviar señal WebRTC');
    }
  }

  async function startCall() {
    if (!activeNode) return;
    if (!navigator.mediaDevices || !window.RTCPeerConnection) {
      setCallStatus('WebRTC no soportado por el navegador');
      return;
    }

    try {
      await createPeerConnection(activeNode);
      setCallStatus('Llamando a ' + activeNode + '...');
      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      await sendSignal(activeNode, 'offer', offer);
      document.getElementById('hangup-btn').disabled = false;
    } catch (err) {
      setCallStatus('Error iniciando llamada');
      console.error(err);
      endCallUi('Error iniciando llamada');
    }
  }

  async function hangupCall() {
    if (activeCallPeer) {
      try {
        await sendSignal(activeCallPeer, 'hangup', { reason: 'ended' });
      } catch (err) {
        console.error(err);
      }
    }
    endCallUi('Llamada colgada');
  }

  async function acceptIncomingCall() {
    if (!pendingCaller || !pendingOffer) return;

    try {
      const caller = pendingCaller;
      const offer = pendingOffer;
      if (activeNode !== caller) {
        selectNode(caller, 'nodo remoto', '?');
      }
      await createPeerConnection(caller);
      await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      await sendSignal(caller, 'answer', answer);
      setCallStatus('Contestando a ' + caller + '...');
    } catch (err) {
      console.error(err);
      endCallUi('Error contestando llamada');
    }
  }

  async function rejectIncomingCall() {
    if (!pendingCaller) {
      hideIncomingCall();
      return;
    }

    const caller = pendingCaller;
    hideIncomingCall();
    try {
      await sendSignal(caller, 'reject', { reason: 'declined' });
    } catch (err) {
      console.error(err);
    }
    setCallStatus('Llamada rechazada');
  }

  function endCallUi(statusText) {
    isCallActive = false;
    activeCallPeer = null;
    hideIncomingCall();
    if (peerConnection) {
      peerConnection.ontrack = null;
      peerConnection.onicecandidate = null;
      peerConnection.onconnectionstatechange = null;
      peerConnection.close();
      peerConnection = null;
    }
    if (remoteStream) {
      remoteStream.getTracks().forEach(track => track.stop());
      remoteStream = null;
    }
    if (localStream) {
      localStream.getTracks().forEach(track => track.stop());
      localStream = null;
    }
    document.getElementById('local-video').srcObject = null;
    document.getElementById('remote-video').srcObject = null;
    document.getElementById('video-panel').style.display = 'none';
    document.getElementById('hangup-btn').disabled = true;
    updateMediaButtons();
    setCallStatus(statusText || 'Sin llamada');
  }

  async function handleSignal(signal) {
    const sender = signal.from;
    const signalType = signal.signal_type;
    const signalData = signal.signal_data;

    if (!sender) return;

    if (signalType === 'offer') {
      if (isCallActive && activeCallPeer && activeCallPeer !== sender) {
        await sendSignal(sender, 'busy', { reason: 'in-call' });
        return;
      }
      if (pendingCaller && pendingCaller !== sender) {
        await sendSignal(sender, 'busy', { reason: 'ringing-with-other-peer' });
        return;
      }
      if (activeNode !== sender) {
        selectNode(sender, 'nodo remoto', '?');
      }
      showIncomingCall(sender, signalData);
      return;
    }

    if (signalType === 'answer') {
      if (!peerConnection) return;
      await peerConnection.setRemoteDescription(new RTCSessionDescription(signalData));
      setCallStatus('Conectando llamada...');
      return;
    }

    if (signalType === 'ice-candidate') {
      if (!peerConnection) return;
      try {
        await peerConnection.addIceCandidate(new RTCIceCandidate(signalData));
      } catch (err) {
        console.error('ICE candidate inválido', err);
      }
      return;
    }

    if (signalType === 'hangup') {
      endCallUi('El otro nodo colgó');
      return;
    }

    if (signalType === 'busy') {
      endCallUi('El nodo remoto está en otra llamada');
      return;
    }

    if (signalType === 'reject') {
      endCallUi('El nodo remoto rechazó la llamada');
    }
  }

  async function pollSignals() {
    try {
      const res = await fetch('/webrtc/signals/');
      const data = await res.json();
      const signals = data.signals || [];
      for (const signal of signals) {
        await handleSignal(signal);
      }
    } catch (err) {
      console.error('Error leyendo señales WebRTC', err);
    }
  }

  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMsg();
  });

  document.getElementById('msg-input').addEventListener('input', () => {
    if (!activeNode) return;
    
    const now = Date.now();
    // Enviar señal máximo una vez cada 2 segundos para no saturar la red o el API
    if (now - lastTypingTime > 2000) { 
      fetch(`/typing/send/?target=${encodeURIComponent(activeNode)}`);
      lastTypingTime = now;
    }
  });

  async function checkTypingStatus() {
    if (!activeNode) return;
    
    try {
      const res = await fetch('/typing/status/');
      const data = await res.json(); // Se espera algo como: { active_typing: ["ip:puerto", ...] }
      
      const typingIndicator = document.getElementById('typing-indicator');
      
      // Si el nodo actual está en la lista de los que están escribiendo
      if (data.active_typing && data.active_typing.includes(activeNode)) {
        typingIndicator.style.display = 'flex';
      } else {
        typingIndicator.style.display = 'none';
      }
    } catch (err) {
      console.error('Error comprobando estado de escritura', err);
    }
  }

  // polling WebRTC cada 1s para señalización
  setInterval(() => {
    pollSignals();
  }, 1000);

  loadNodes();
  pollSignals();
</script>
