<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat WebSocket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a35;
            --bg-tertiary: #252547;
            --bg-input: #1e1e3a;
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.3);
            --accent2: #6c63ff;
            --accent2-glow: rgba(108, 99, 255, 0.3);
            --green: #2ecc71;
            --blue: #3b82f6;
            --fg: #e8e8f0;
            --fg-dim: #6b6b8d;
            --fg-muted: #4a4a6a;
            --border: rgba(255,255,255,0.06);
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--fg);
            height: 100vh;
            overflow: hidden;
        }

        /* ── PANTALLA DE LOGIN ───────────────────── */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(ellipse at 30% 50%, rgba(108,99,255,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 50%, rgba(233,69,96,0.06) 0%, transparent 60%),
                        var(--bg-primary);
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 400px;
            text-align: center;
            box-shadow: var(--shadow);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-icon { font-size: 56px; margin-bottom: 8px; }
        .login-title {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .login-subtitle { color: var(--fg-dim); font-size: 13px; margin-bottom: 32px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label {
            display: block; font-size: 13px; font-weight: 500;
            color: var(--fg-dim); margin-bottom: 8px;
        }
        .input-group input {
            width: 100%; padding: 14px 16px; font-size: 15px;
            font-family: 'Inter', sans-serif;
            background: var(--bg-input); color: var(--fg);
            border: 2px solid var(--border); border-radius: 10px;
            outline: none; transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-group input:focus {
            border-color: var(--accent2);
            box-shadow: 0 0 0 3px var(--accent2-glow);
        }

        .btn-connect {
            width: 100%; padding: 14px; font-size: 15px; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white; border: none; border-radius: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }
        .btn-connect:active { transform: translateY(0); }
        .btn-connect:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .login-error {
            color: var(--accent); font-size: 13px;
            margin-top: 14px; min-height: 20px;
        }

        /* ── PANTALLA DE CHAT ────────────────────── */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            flex-shrink: 0;
        }
        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .chat-header h1 { font-size: 18px; font-weight: 600; color: white; }
        .chat-header .server-info {
            font-size: 12px; color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 20px;
        }
        .chat-mode-badge {
            font-size: 11px; font-weight: 700; color: white;
            background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 20px;
            margin-left: 12px;
        }
        .chat-mode-badge.private { background: rgba(233,69,96,0.4); }

        .chat-body { display: flex; flex: 1; overflow: hidden; }

        /* ── MENSAJES ─────────────────────────────── */
        .messages-panel { flex: 1; display: flex; flex-direction: column; }
        #messages-container {
            flex: 1; overflow-y: auto; padding: 20px 24px;
            display: flex; flex-direction: column; gap: 6px;
        }
        #messages-container::-webkit-scrollbar { width: 6px; }
        #messages-container::-webkit-scrollbar-track { background: transparent; }
        #messages-container::-webkit-scrollbar-thumb { background: var(--fg-muted); border-radius: 3px; }

        .msg { animation: msgIn 0.3s ease; max-width: 100%; }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-system {
            text-align: center; padding: 6px 0;
            color: var(--fg-dim); font-size: 13px; font-style: italic;
        }

        .msg-chat { padding: 8px 0; }
        .msg-chat .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
        .msg-chat .msg-username { font-weight: 600; font-size: 14px; color: var(--blue); }
        .msg-chat.own .msg-username { color: var(--green); }
        .msg-chat .msg-time { font-size: 11px; color: var(--fg-muted); }
        .msg-chat .msg-content { font-size: 14px; line-height: 1.5; color: var(--fg); padding-left: 2px; }

        /* ── PANEL DE USUARIOS ────────────────────── */
        .users-panel {
            width: 220px; flex-shrink: 0;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .users-header {
            padding: 18px 20px 14px;
            font-size: 14px; font-weight: 600;
            border-bottom: 1px solid var(--border);
        }
        .users-header span { color: var(--fg-dim); font-weight: 400; }
        #users-list {
            flex: 1; overflow-y: auto; padding: 10px 16px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .user-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; border-radius: 8px;
            font-size: 13px; font-weight: 500;
            transition: background 0.2s; cursor: pointer; user-select: none;
        }
        .user-item:hover { background: var(--bg-tertiary); }
        .user-item.active { background: var(--accent2); color: white; }
        .user-item.active .user-dot { background: rgba(255,255,255,0.8); }
        .user-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--green); flex-shrink: 0;
            box-shadow: 0 0 6px rgba(46,204,113,0.5);
        }
        .user-you { color: var(--fg-dim); font-weight: 400; font-size: 11px; }
        .user-item.active .user-you { color: rgba(255,255,255,0.7); }

        /* ── INPUT ─────────────────────────────────── */
        .input-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        #message-input {
            flex: 1; padding: 14px 18px; font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--bg-input); color: var(--fg);
            border: 2px solid var(--border); border-radius: 12px;
            outline: none; transition: border-color 0.3s, box-shadow 0.3s;
        }
        #message-input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent2-glow); }
        #message-input::placeholder { color: var(--fg-muted); }

        .btn-send {
            padding: 14px 24px; font-size: 14px; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white; border: none; border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-send:hover { transform: translateY(-1px); box-shadow: 0 4px 16px var(--accent-glow); }
        .btn-send:active { transform: translateY(0); }

        .btn-back {
            padding: 14px 18px; font-size: 14px; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer;
            background: var(--bg-tertiary); color: var(--fg);
            border: 1px solid var(--border); border-radius: 12px;
            transition: background 0.2s;
        }

        @media (max-width: 700px) {
            .users-panel { display: none; }
            .login-card { width: 90%; padding: 32px 24px; }
        }
    </style>
</head>
<body>

<!-- ═══════════════ PANTALLA LOGIN ═══════════════ -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-icon"></div>
        <div class="login-title">Chat WebSocket</div>
        <div class="login-subtitle">Servidor: {{ ws_url }}</div>

        <div class="input-group">
            <label for="username-input">Nombre de usuario</label>
            <input type="text" id="username-input" placeholder="Ej: Usuario"
                   autocomplete="off" autofocus maxlength="30">
        </div>

        <button class="btn-connect" id="btn-connect" onclick="connectChat()">
            Conectarse
        </button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- ═══════════════ PANTALLA CHAT ═══════════════ -->
<div id="chat-screen">
    <div class="chat-header">
        <div class="chat-header-left">
            <h1>💬 Chat WebSocket</h1>
            <span id="chat-mode" class="chat-mode-badge">GLOBAL</span>
        </div>
        <div class="server-info" id="server-info"></div>
    </div>

    <div class="chat-body">
        <div class="messages-panel">
            <div id="messages-container"></div>
        </div>
        <div class="users-panel">
            <div class="users-header">
                En Línea <span id="user-count">(0)</span>
            </div>
            <div id="users-list"></div>
        </div>
    </div>

    <div class="input-bar">
        <button id="back-btn" class="btn-back" onclick="backToGlobalChat()" style="display: none;">← Volver</button>
        <input type="text" id="message-input" placeholder="Escribe un mensaje..."
               autocomplete="off" maxlength="1000">
        <button class="btn-send" onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    const WS_URL = "{{ ws_url }}";
    let socket = null;
    let username = "";
    let chat_mode = "global";
    let private_recipient = null;
    let private_conversations = {};
    let global_messages = [];

    // ── Crypto ──────────────────────────────────────
    let clientPrivateKey = null;
    let clientPublicKeyPem = null;
    let serverPublicKey = null;

    async function generateClientKeys() {
        const keyPair = await window.crypto.subtle.generateKey(
            {
                name: "RSA-OAEP",
                modulusLength: 2048,
                publicExponent: new Uint8Array([1, 0, 1]),
                hash: "SHA-256"
            },
            true,
            ["encrypt", "decrypt"]
        );
        clientPrivateKey = keyPair.privateKey;

        // Exportar llave pública como PEM
        const exported = await window.crypto.subtle.exportKey("spki", keyPair.publicKey);
        const b64 = btoa(String.fromCharCode(...new Uint8Array(exported)));
        clientPublicKeyPem = `-----BEGIN PUBLIC KEY-----\n${b64.match(/.{1,64}/g).join('\n')}\n-----END PUBLIC KEY-----`;
    }

    async function importServerPublicKey(pem) {
        const b64 = pem.replace(/-----[^-]+-----/g, '').replace(/\s/g, '');
        const binary = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        serverPublicKey = await window.crypto.subtle.importKey(
            "spki",
            binary.buffer,
            { name: "RSA-OAEP", hash: "SHA-256" },
            false,
            ["encrypt"]
        );
    }

    async function encryptWithServerKey(text) {
        const encoded = new TextEncoder().encode(text);
        const encrypted = await window.crypto.subtle.encrypt(
            { name: "RSA-OAEP" },
            serverPublicKey,
            encoded
        );
        return btoa(String.fromCharCode(...new Uint8Array(encrypted)));
    }

    async function decryptWithClientKey(b64) {
        const binary = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const decrypted = await window.crypto.subtle.decrypt(
            { name: "RSA-OAEP" },
            clientPrivateKey,
            binary
        );
        return new TextDecoder().decode(decrypted);
    }

    // ── Conectar ────────────────────────────────────
    async function connectChat() {
        const input = document.getElementById("username-input");
        const error = document.getElementById("login-error");
        const btn   = document.getElementById("btn-connect");

        username = input.value.trim();
        if (!username) {
            error.textContent = "Ingresa un nombre de usuario";
            input.focus();
            return;
        }

        btn.disabled = true;
        btn.textContent = "Generando llaves...";
        error.textContent = "";

        // Generar llaves RSA del cliente antes de conectar
        await generateClientKeys();

        btn.textContent = "Conectando...";
        socket = new WebSocket(WS_URL);

        socket.onopen = () => {
            // No hacer join todavía — esperar la llave pública del servidor
        };

        socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            await handleMessage(data);
        };

        socket.onclose = () => {
            addSystemMessage("Conexión cerrada con el servidor");
        };

        socket.onerror = () => {
            error.textContent = "No se pudo conectar a " + WS_URL;
            btn.disabled = false;
            btn.textContent = "Conectarse";
        };
    }

    // ── Manejar mensajes entrantes ──────────────────
    async function handleMessage(data) {
        // Primer mensaje del servidor: llave pública
        if (data.type === "server_public_key") {
            await importServerPublicKey(data.public_key);

            // Ahora sí hacer join enviando nuestra llave pública
            socket.send(JSON.stringify({
                type: "join",
                username: username,
                public_key: clientPublicKeyPem
            }));

            // Mostrar pantalla de chat
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("chat-screen").style.display = "flex";
            document.getElementById("server-info").textContent = WS_URL + "  —  " + username;
            document.getElementById("message-input").focus();
            return;
        }

        if (data.type === "system") {
            addSystemMessage(data.content, data.timestamp);
        } else if (data.type === "message") {
            // Descifrar con llave privada del cliente
            try {
                data.content = await decryptWithClientKey(data.content);
            } catch(e) {
                data.content = "[mensaje no descifrable]";
            }
            addChatMessage(data.username, data.content, data.timestamp, data.is_own);
        } else if (data.type === "private_message") {
            // Descifrar mensaje privado
            try {
                data.content = await decryptWithClientKey(data.content);
            } catch(e) {
                data.content = "[mensaje no descifrable]";
            }
            handlePrivateMessage(data.sender, data.content, data.timestamp);
        } else if (data.type === "private_message_sent") {
            // El servidor ya nos devuelve el texto plano de confirmación
            if (chat_mode === "private" && private_recipient === data.recipient) {
                addChatMessage("Tú", data.content, data.timestamp, true, true);
            }
            storePrivateMessage(data.recipient, "Tú", data.content, true);
        } else if (data.type === "user_list") {
            updateUserList(data.users);
        } else if (data.type === "error") {
            addSystemMessage("⚠️ " + data.content, data.timestamp);
        }
    }

    // ── Renderizar mensaje de sistema ───────────────
    function addSystemMessage(content, ts) {
        if (chat_mode === "global") {
            global_messages.push({ type: "system", content, ts });
        }
        const container = document.getElementById("messages-container");
        const div = document.createElement("div");
        div.className = "msg msg-system";
        div.textContent = (ts ? `[${ts}] ` : "") + content;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // ── Renderizar mensaje de chat ──────────────────
    function addChatMessage(user, content, ts, isOwn, isPrivate = false) {
        if (isPrivate && chat_mode !== "private") return;
        if (!isPrivate && chat_mode !== "global") return;

        if (!isPrivate) {
            global_messages.push({ type: "chat", user, content, ts, isOwn });
        }

        const container = document.getElementById("messages-container");
        const div = document.createElement("div");
        div.className = "msg msg-chat" + (isOwn ? " own" : "");
        div.innerHTML = `
            <div class="msg-header">
                <span class="msg-username">${escapeHtml(user)}</span>
                <span class="msg-time">${ts || ""}</span>
            </div>
            <div class="msg-content">${escapeHtml(content)}</div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // ── Manejar mensaje privado entrante ────────────
    function handlePrivateMessage(sender, content, ts) {
        storePrivateMessage(sender, sender, content, false);
        if (chat_mode === "private" && private_recipient === sender) {
            addChatMessage(sender, content, ts, false, true);
        } else {
            addSystemMessage(`📨 Mensaje privado de ${sender} (haz clic en su nombre para responder)`);
        }
    }

    function storePrivateMessage(user, senderName, content, isSent) {
        if (!private_conversations[user]) private_conversations[user] = [];
        private_conversations[user].push({
            sender: senderName, content, isSent,
            time: new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
        });
    }

    // ── Lista de usuarios ───────────────────────────
    function updateUserList(users) {
        const list = document.getElementById("users-list");
        const count = document.getElementById("user-count");
        count.textContent = `(${users.length})`;
        list.innerHTML = "";
        users.sort().forEach(user => {
            const div = document.createElement("div");
            div.className = "user-item" + (chat_mode === "private" && private_recipient === user ? " active" : "");
            const youTag = user === username ? ' <span class="user-you">(tú)</span>' : "";
            div.innerHTML = `<div class="user-dot"></div>${escapeHtml(user)}${youTag}`;
            if (user !== username) div.onclick = () => openPrivateChat(user);
            list.appendChild(div);
        });
    }

    // ── Abrir chat privado ──────────────────────────
    function openPrivateChat(user) {
        chat_mode = "private";
        private_recipient = user;
        updateChatMode();

        const container = document.getElementById("messages-container");
        container.innerHTML = "";

        if (private_conversations[user]) {
            private_conversations[user].forEach(msg => {
                addChatMessage(msg.sender, msg.content, msg.time, msg.isSent, true);
            });
        }

        document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
        event.target.closest('.user-item')?.classList.add('active');
        document.getElementById("message-input").focus();
    }

    // ── Volver al chat global ───────────────────────
    function backToGlobalChat() {
        chat_mode = "global";
        private_recipient = null;
        updateChatMode();

        const container = document.getElementById("messages-container");
        container.innerHTML = "";

        // Renderizar directo al DOM sin pasar por addChatMessage/addSystemMessage
        // para no volver a guardar en global_messages y evitar duplicados
        global_messages.forEach(msg => {
            const div = document.createElement("div");
            if (msg.type === "system") {
                div.className = "msg msg-system";
                div.textContent = (msg.ts ? `[${msg.ts}] ` : "") + msg.content;
            } else {
                div.className = "msg msg-chat" + (msg.isOwn ? " own" : "");
                div.innerHTML = `
                    <div class="msg-header">
                        <span class="msg-username">${escapeHtml(msg.user)}</span>
                        <span class="msg-time">${msg.ts || ""}</span>
                    </div>
                    <div class="msg-content">${escapeHtml(msg.content)}</div>
                `;
            }
            container.appendChild(div);
        });

        container.scrollTop = container.scrollHeight;
        document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
    }

    function updateChatMode() {
        const badge = document.getElementById("chat-mode");
        const backBtn = document.getElementById("back-btn");
        if (chat_mode === "global") {
            badge.textContent = "GLOBAL";
            badge.classList.remove("private");
            backBtn.style.display = "none";
        } else {
            badge.textContent = "PRIVADO con " + escapeHtml(private_recipient);
            badge.classList.add("private");
            backBtn.style.display = "block";
        }
    }

    // ── Enviar mensaje ──────────────────────────────
    async function sendMessage() {
        const input = document.getElementById("message-input");
        const content = input.value.trim();
        if (!content || !socket || socket.readyState !== WebSocket.OPEN) return;
        if (!serverPublicKey) return;

        if (chat_mode === "global") {
            const encrypted = await encryptWithServerKey(content);
            socket.send(JSON.stringify({ type: "message", content: encrypted }));
        } else if (chat_mode === "private" && private_recipient) {
            const encrypted = await encryptWithServerKey(content);
            socket.send(JSON.stringify({
                type: "private_message",
                recipient: private_recipient,
                content: encrypted
            }));
        }

        input.value = "";
        input.focus();
    }

    // Enter para enviar
    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            const loginScreen = document.getElementById("login-screen");
            if (loginScreen.style.display !== "none") {
                connectChat();
            } else {
                sendMessage();
            }
        }
    });

    // Escape para volver al chat global
    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && chat_mode === "private") {
            backToGlobalChat();
        }
    });

    // ── Utilidades ──────────────────────────────────
    function escapeHtml(text) {
        const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
        return text.replace(/[&<>"']/g, c => map[c]);
    }
</script>

</body>
</html>
