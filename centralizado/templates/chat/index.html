<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat WebSocket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a35;
            --bg-tertiary: #252547;
            --bg-input: #1e1e3a;
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.3);
            --accent2: #6c63ff;
            --accent2-glow: rgba(108, 99, 255, 0.3);
            --green: #2ecc71;
            --blue: #3b82f6;
            --fg: #e8e8f0;
            --fg-dim: #6b6b8d;
            --fg-muted: #4a4a6a;
            --border: rgba(255,255,255,0.06);
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--fg);
            height: 100vh;
            overflow: hidden;
        }

        /* ── PANTALLA DE LOGIN ───────────────────── */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(ellipse at 30% 50%, rgba(108,99,255,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 50%, rgba(233,69,96,0.06) 0%, transparent 60%),
                        var(--bg-primary);
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 400px;
            text-align: center;
            box-shadow: var(--shadow);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-icon { font-size: 56px; margin-bottom: 8px; }
        .login-title {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .login-subtitle { color: var(--fg-dim); font-size: 13px; margin-bottom: 32px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label {
            display: block; font-size: 13px; font-weight: 500;
            color: var(--fg-dim); margin-bottom: 8px;
        }
        .input-group input {
            width: 100%; padding: 14px 16px; font-size: 15px;
            font-family: 'Inter', sans-serif;
            background: var(--bg-input); color: var(--fg);
            border: 2px solid var(--border); border-radius: 10px;
            outline: none; transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-group input:focus {
            border-color: var(--accent2);
            box-shadow: 0 0 0 3px var(--accent2-glow);
        }

        .btn-connect {
            width: 100%; padding: 14px; font-size: 15px; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white; border: none; border-radius: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }
        .btn-connect:active { transform: translateY(0); }
        .btn-connect:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .login-error {
            color: var(--accent); font-size: 13px;
            margin-top: 14px; min-height: 20px;
        }

        /* ── PANTALLA DE CHAT ────────────────────── */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            flex-shrink: 0;
        }
        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .chat-header h1 { font-size: 18px; font-weight: 600; color: white; }
        .chat-header .server-info {
            font-size: 12px; color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 20px;
        }

        .chat-body {
            display: flex; flex: 1; overflow: hidden;
        }

        /* ── MENSAJES ─────────────────────────────── */
        .messages-panel { flex: 1; display: flex; flex-direction: column; }
        #messages-container {
            flex: 1; overflow-y: auto; padding: 20px 24px;
            display: flex; flex-direction: column; gap: 6px;
        }
        #messages-container::-webkit-scrollbar { width: 6px; }
        #messages-container::-webkit-scrollbar-track { background: transparent; }
        #messages-container::-webkit-scrollbar-thumb {
            background: var(--fg-muted); border-radius: 3px;
        }

        .msg { animation: msgIn 0.3s ease; max-width: 100%; }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-system {
            text-align: center; padding: 6px 0;
            color: var(--fg-dim); font-size: 13px; font-style: italic;
        }

        .msg-chat { padding: 8px 0; }
        .msg-chat .msg-header {
            display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px;
        }
        .msg-chat .msg-username {
            font-weight: 600; font-size: 14px; color: var(--blue);
        }
        .msg-chat.own .msg-username { color: var(--green); }
        .msg-chat .msg-time {
            font-size: 11px; color: var(--fg-muted);
        }
        .msg-chat .msg-content {
            font-size: 14px; line-height: 1.5;
            color: var(--fg); padding-left: 2px;
        }

        /* ── PANEL DE USUARIOS ────────────────────── */
        .users-panel {
            width: 220px; flex-shrink: 0;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .users-header {
            padding: 18px 20px 14px;
            font-size: 14px; font-weight: 600;
            border-bottom: 1px solid var(--border);
        }
        .users-header span { color: var(--fg-dim); font-weight: 400; }
        #users-list {
            flex: 1; overflow-y: auto; padding: 10px 16px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .user-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; border-radius: 8px;
            font-size: 13px; font-weight: 500;
            transition: background 0.2s;
        }
        .user-item:hover { background: var(--bg-tertiary); }
        .user-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--green); flex-shrink: 0;
            box-shadow: 0 0 6px rgba(46,204,113,0.5);
        }
        .user-you { color: var(--fg-dim); font-weight: 400; font-size: 11px; }

        /* ── INPUT ─────────────────────────────────── */
        .input-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        #message-input {
            flex: 1; padding: 14px 18px; font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--bg-input); color: var(--fg);
            border: 2px solid var(--border); border-radius: 12px;
            outline: none; transition: border-color 0.3s, box-shadow 0.3s;
        }
        #message-input:focus {
            border-color: var(--accent2);
            box-shadow: 0 0 0 3px var(--accent2-glow);
        }
        #message-input::placeholder { color: var(--fg-muted); }

        .btn-send {
            padding: 14px 24px; font-size: 14px; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white; border: none; border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-send:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .btn-send:active { transform: translateY(0); }

        /* ── RESPONSIVE ───────────────────────────── */
        @media (max-width: 700px) {
            .users-panel { display: none; }
            .login-card { width: 90%; padding: 32px 24px; }
        }
    </style>
</head>
<body>

<!-- ═══════════════ PANTALLA LOGIN ═══════════════ -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-icon"></div>
        <div class="login-title">Chat WebSocket</div>
        <div class="login-subtitle">Servidor: {{ ws_url }}</div>

        <div class="input-group">
            <label for="username-input">Nombre de usuario</label>
            <input type="text" id="username-input" placeholder="Ej: Usuario"
                   autocomplete="off" autofocus maxlength="30">
        </div>

        <button class="btn-connect" id="btn-connect" onclick="connectChat()">
            Conectarse
        </button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- ═══════════════ PANTALLA CHAT ═══════════════ -->
<div id="chat-screen">
    <div class="chat-header">
        <div class="chat-header-left">
            <h1>Chat WebSocket</h1>
        </div>
        <div class="server-info" id="server-info"></div>
    </div>

    <div class="chat-body">
        <div class="messages-panel">
            <div id="messages-container"></div>
        </div>
        <div class="users-panel">
            <div class="users-header">
                En Línea <span id="user-count">(0)</span>
            </div>
            <div id="users-list"></div>
        </div>
    </div>

    <div class="input-bar">
        <input type="text" id="message-input" placeholder="Escribe un mensaje..."
               autocomplete="off" maxlength="1000">
        <button class="btn-send" onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    const WS_URL = "{{ ws_url }}";
    let socket = null;
    let username = "";

    // ── Conectar ────────────────────────────────────
    function connectChat() {
        const input = document.getElementById("username-input");
        const error = document.getElementById("login-error");
        const btn   = document.getElementById("btn-connect");

        username = input.value.trim();
        if (!username) {
            error.textContent = "Ingresa un nombre de usuario";
            input.focus();
            return;
        }

        btn.disabled = true;
        btn.textContent = "Conectando...";
        error.textContent = "";

        socket = new WebSocket(WS_URL);

        socket.onopen = () => {
            socket.send(JSON.stringify({ type: "join", username: username }));

            // Mostrar pantalla de chat
            document.getElementById("login-screen").style.display = "none";
            const chatScreen = document.getElementById("chat-screen");
            chatScreen.style.display = "flex";
            document.getElementById("server-info").textContent = WS_URL + "  —  " + username;
            document.getElementById("message-input").focus();
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            handleMessage(data);
        };

        socket.onclose = () => {
            addSystemMessage("Conexión cerrada con el servidor");
        };

        socket.onerror = () => {
            error.textContent = "No se pudo conectar a " + WS_URL;
            btn.disabled = false;
            btn.textContent = "Conectarse";
        };
    }

    // ── Manejar mensajes ────────────────────────────
    function handleMessage(data) {
        if (data.type === "system") {
            addSystemMessage(data.content, data.timestamp);
        } else if (data.type === "message") {
            addChatMessage(data.username, data.content, data.timestamp, data.is_own);
        } else if (data.type === "user_list") {
            updateUserList(data.users);
        }
    }

    function addSystemMessage(content, ts) {
        const container = document.getElementById("messages-container");
        const div = document.createElement("div");
        div.className = "msg msg-system";
        div.textContent = (ts ? `[${ts}] ` : "") + content;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function addChatMessage(user, content, ts, isOwn) {
        const container = document.getElementById("messages-container");
        const div = document.createElement("div");
        div.className = "msg msg-chat" + (isOwn ? " own" : "");
        div.innerHTML = `
            <div class="msg-header">
                <span class="msg-username">${escapeHtml(user)}</span>
                <span class="msg-time">${ts || ""}</span>
            </div>
            <div class="msg-content">${escapeHtml(content)}</div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function updateUserList(users) {
        const list = document.getElementById("users-list");
        const count = document.getElementById("user-count");
        count.textContent = `(${users.length})`;
        list.innerHTML = "";
        users.sort().forEach(user => {
            const div = document.createElement("div");
            div.className = "user-item";
            const youTag = user === username ? ' <span class="user-you">(tú)</span>' : "";
            div.innerHTML = `<div class="user-dot"></div>${escapeHtml(user)}${youTag}`;
            list.appendChild(div);
        });
    }

    // ── Enviar mensaje ──────────────────────────────
    function sendMessage() {
        const input = document.getElementById("message-input");
        const content = input.value.trim();
        if (!content || !socket || socket.readyState !== WebSocket.OPEN) return;

        socket.send(JSON.stringify({ type: "message", content: content }));
        input.value = "";
        input.focus();
    }

    // Enter para enviar
    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            const loginScreen = document.getElementById("login-screen");
            if (loginScreen.style.display !== "none") {
                connectChat();
            } else {
                sendMessage();
            }
        }
    });

    // ── Utilidades ──────────────────────────────────
    function escapeHtml(text) {
        const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
        return text.replace(/[&<>"']/g, c => map[c]);
    }
</script>

</body>
</html>
